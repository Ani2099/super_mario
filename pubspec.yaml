name: super_mario
description: "A production-ready 2D platformer."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Game Engine
  flame: ^1.18.0
  flame_audio: ^2.2.0

  # State Management & Routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.1

  # Local Save System
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  uuid: ^4.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/sfx/
    - assets/audio/music/
    - assets/tiles/
